<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:180px; height:180px; background:#0A0E0C; }
  .icon{
    width:180px; height:180px;
    background:
      radial-gradient(120px 120px at 70% 20%, rgba(127,163,101,.25), transparent 60%),
      #0A0E0C;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .icon::after{
    content:''; position:absolute; left:0; right:0; bottom:0; height:14px;
    background:repeating-linear-gradient(45deg,#7FA365 0 10px,#0A0E0C 10px 20px);
  }
  .dm{
    font-family:'Anton',sans-serif; color:#7FA365; font-size:84px; line-height:1; letter-spacing:-2px;
  }
  .label{
    font-family:'JetBrains Mono'; color:#E8E4D8; font-size:10px; letter-spacing:.18em; text-transform:uppercase; margin-top:6px;
  }
</style>
</head>
<body>
<div class="icon">
  <div class="dm">DM</div>
  <div class="label">Concrete</div>
</div>
</body>
</html>
